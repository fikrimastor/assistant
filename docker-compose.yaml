services:
  hermes-work:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-work
    restart: unless-stopped
    command: gateway run
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_WORK_API_KEY}
      - API_SERVER_CORS_ORIGINS=*
      - HERMES_DASHBOARD=1
    expose:
      - "8642"
      - "9119"
    volumes:
      - /mnt/hermes-work:/opt/data
    mem_limit: 2g
    cpus: 2.0
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Dashboard
      - "traefik.http.routers.hermes-work.rule=Host(`${HERMES_WORK_WEB_HOST}`)"
      - "traefik.http.routers.hermes-work.entrypoints=websecure"
      - "traefik.http.routers.hermes-work.tls=true"
      - "traefik.http.routers.hermes-work.service=hermes-work"
      - "traefik.http.routers.hermes-work.middlewares=hermes-work-auth"
      - "traefik.http.middlewares.hermes-work-auth.basicauth.users=${HERMES_TRAEFIK_ACCESS}"
      - "traefik.http.services.hermes-work.loadbalancer.server.port=9119"
      # API / MCP
      - "traefik.http.routers.hermes-work-api.rule=Host(`${HERMES_WORK_API_HOST}`)"
      - "traefik.http.routers.hermes-work-api.entrypoints=websecure"
      - "traefik.http.routers.hermes-work-api.tls=true"
      - "traefik.http.routers.hermes-work-api.service=hermes-work-api"
      - "traefik.http.services.hermes-work-api.loadbalancer.server.port=8642"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  hermes-personal:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-personal
    restart: unless-stopped
    command: gateway run
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_PERSONAL_API_KEY}
      - API_SERVER_CORS_ORIGINS=*
      - HERMES_DASHBOARD=1
    expose:
      - "8642"
      - "9119"
    volumes:
      - /mnt/hermes-personal:/opt/data
    mem_limit: 2g
    cpus: 2.0
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      # Dashboard
      - "traefik.http.routers.hermes-personal.rule=Host(`${HERMES_PERSONAL_WEB_HOST}`)"
      - "traefik.http.routers.hermes-personal.entrypoints=websecure"
      - "traefik.http.routers.hermes-personal.tls=true"
      - "traefik.http.routers.hermes-personal.service=hermes-personal"
      - "traefik.http.routers.hermes-personal.middlewares=hermes-personal-auth"
      - "traefik.http.middlewares.hermes-personal-auth.basicauth.users=${HERMES_TRAEFIK_ACCESS}"
      - "traefik.http.services.hermes-personal.loadbalancer.server.port=9119"
      # API / MCP
      - "traefik.http.routers.hermes-personal-api.rule=Host(`${HERMES_PERSONAL_API_HOST}`)"
      - "traefik.http.routers.hermes-personal-api.entrypoints=websecure"
      - "traefik.http.routers.hermes-personal-api.tls=true"
      - "traefik.http.routers.hermes-personal-api.service=hermes-personal-api"
      - "traefik.http.services.hermes-personal-api.loadbalancer.server.port=8642"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8642/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  coolify:
    external: true