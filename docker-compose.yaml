services:
  hermes-work:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-work
    restart: unless-stopped
    command: gateway run
    environment:
      - HERMES_DASHBOARD=1
    expose:
      - "8642"
      - "9119"
    volumes:
      - /mnt/hermes-work:/opt/data
    mem_limit: 2g
    cpus: 2.0

  hermes-personal:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-personal
    restart: unless-stopped
    command: gateway run
    environment:
      - HERMES_DASHBOARD=1
    expose:
      - "8642"
      - "9119"
    volumes:
      - /mnt/hermes-personal:/opt/data
    mem_limit: 2g
    cpus: 2.0