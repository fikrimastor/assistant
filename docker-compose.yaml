services:
  hermes-work:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-work
    restart: unless-stopped
    command: gateway run
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_WORK_API_KEY}
      - API_SERVER_CORS_ORIGINS=*
      - HERMES_DASHBOARD=1
    expose:
      - "8642"
      - "9119"
    volumes:
      - /mnt/hermes-work:/opt/data
    mem_limit: 2g
    cpus: 2.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-work-api.rule=Host(`${HERMES_WORK_API_HOST}`)"
      - "traefik.http.routers.hermes-work-api.entrypoints=websecure"
      - "traefik.http.routers.hermes-work-api.tls=true"
      - "traefik.http.services.hermes-work-api.loadbalancer.server.port=8642"

  hermes-personal:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-personal
    restart: unless-stopped
    command: gateway run
    environment:
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_PERSONAL_API_KEY}
      - API_SERVER_CORS_ORIGINS=*
      - HERMES_DASHBOARD=1
    expose:
      - "8642"
      - "9119"
    volumes:
      - /mnt/hermes-personal:/opt/data
    mem_limit: 2g
    cpus: 2.0
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hermes-personal-api.rule=Host(`${HERMES_PERSONAL_API_HOST}`)"
      - "traefik.http.routers.hermes-personal-api.entrypoints=websecure"
      - "traefik.http.routers.hermes-personal-api.tls=true"
      - "traefik.http.services.hermes-personal-api.loadbalancer.server.port=8642"